<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 画封面</title>
  <link rel="stylesheet" href="./cover.css">
</head>
<body>
  <main class="app">
    <header>
      <h1>AI 画封面</h1>
      <button id="refreshBtn" type="button">刷新</button>
    </header>
    <section id="bookInfo" class="book-info">加载中</section>
    <section class="form">
      <textarea id="prompt" placeholder="补充封面风格、元素、色彩，例如：赛博朋克城市、雨夜、暖色灯光"></textarea>
      <button id="generateBtn" class="primary" type="button">生成封面</button>
    </section>
    <section id="status" class="status">等待书籍上下文</section>
    <section id="preview" class="preview" hidden>
      <img id="image" alt="生成的封面">
      <div class="actions">
        <button id="applyBtn" class="primary" type="button">写回封面</button>
      </div>
    </section>
  </main>
  <script src="./cover.js"></script>
</body>
</html>
